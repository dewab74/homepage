<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="./bifrost-berkano-logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="./styles.css">
    <style>
        .resume-hero {
            padding: 40px 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .resume-content {
            padding-bottom: 48px;
        }

        .resume-content h1 {
            margin: 0 0 8px;
            font-size: clamp(2.1rem, 4vw, 3.2rem);
            font-weight: 300;
            line-height: 1.1;
        }

        .resume-content .resume-title-line {
            margin: 0 0 6px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .resume-content .resume-contact-line {
            margin: 0 0 28px;
            color: var(--muted);
        }

        .resume-content .resume-contact-line a {
            color: var(--muted);
        }

        .resume-content h2 {
            margin: 36px 0 14px;
            padding-top: 24px;
            border-top: 1px solid var(--line);
            font-size: 1.4rem;
            font-weight: 700;
        }

        .resume-content h2:first-of-type {
            margin-top: 8px;
        }

        .resume-content h3 {
            margin: 22px 0 2px;
            font-size: 1.08rem;
            font-weight: 700;
        }

        .resume-content p {
            margin: 0 0 10px;
            line-height: 1.7;
        }

        .resume-content ul {
            margin: 6px 0 16px;
            padding-left: 20px;
            line-height: 1.65;
        }

        .resume-content li {
            margin-bottom: 4px;
        }

        .resume-content li > ul {
            margin-top: 4px;
        }

        .resume-content a {
            color: var(--lavender-strong);
        }

        .resume-content em {
            color: var(--muted);
        }

        .resume-content strong {
            font-weight: 700;
        }

        .resume-content hr {
            border: none;
            border-top: 1px solid var(--line);
            margin: 28px 0;
        }

        @media print {
            .site-header,
            .site-footer,
            .resume-hero {
                display: none;
            }

            body {
                background: #ffffff;
            }
        }
    </style>
</head>
<body>
<header class="site-header">
    <div class="site-header-inner">
        <a class="brand" href="./index.html">
            <img class="brand-logo" src="./bifrost-berkano-logo.svg" alt="Bifrost logo">
            <span class="brand-name">Bifrost</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
            <a href="./index.html">Home</a>
            <a href="./history.html">Cruise History</a>
            <a href="./resume.html" aria-current="page">Resume</a>
        </nav>
    </div>
</header>

<main>
    <section class="resume-hero container">
        <p class="eyebrow" style="margin:0; color: var(--mauve); font-size: 0.86rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;">Résumé</p>
        <div class="actions">
            <button class="btn btn-ghost" type="button" onclick="window.print()">Print / Save as PDF</button>
        </div>
    </section>

    <section class="resume-content container">
        {{ content }}
    </section>
</main>

<footer class="site-footer">&copy; 2026 Daniel Whicker &middot; Bifrost</footer>
</body>
</html>
